name: MinimalWebKitBrowser
# XcodeGen spec — regenerate the .xcodeproj with:  xcodegen generate
options:
  bundleIdPrefix: com.minimalwebkit
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 5 language mode keeps the build fast & avoids strict-concurrency churn.
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_LANGUAGE: en
    # Universal binary; Apple Silicon (arm64) is the primary/optimized target.
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    DEAD_CODE_STRIPPING: YES
    # Strip symbols in release for a leaner, faster-launching binary.
    STRIP_INSTALLED_PRODUCT: YES
    LLVM_LTO: YES_THIN
configFiles:
  Release: configs/Release.xcconfig
  Debug: configs/Debug.xcconfig
targets:
  MinimalWebKitBrowser:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MinimalWebKitBrowser
        excludes:
          - "Resources/DefaultContentBlocker/*.json"
    resources:
      - path: MinimalWebKitBrowser/Resources/Assets.xcassets
      - path: MinimalWebKitBrowser/Resources/DefaultContentBlocker
        type: folder
        buildPhase: resources
    info:
      path: MinimalWebKitBrowser/Resources/Info.plist
      properties:
        CFBundleDisplayName: Minimal Browser
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        NSMainNibFile: ""
        # WebKit loads remote content; ATS defaults are fine (WKWebView is exempt).
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: MinimalWebKitBrowser/Resources/MinimalWebKitBrowser.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minimalwebkit.browser
        PRODUCT_NAME: MinimalWebKitBrowser
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MinimalWebKitBrowser/Resources/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
